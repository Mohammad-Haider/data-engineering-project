services:
  db:
    image: mysql:8.0
    container_name: job_market_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_market_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  dashboard:
    build: .
    container_name: job_market_dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://appuser:apppassword@db:3306/job_market_db
      # Prefect tab in the dashboard resolves this host when `prefect-server` is on the same Compose network.
      - PREFECT_API_URL=http://prefect-server:4200/api

  prefect-server:
    image: prefecthq/prefect:3-python3.10
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

  # Long-lived Prefect 3 runner: registers deployment + executes scheduled runs (hybrid / local process).
  prefect-pipeline:
    build: .
    container_name: job_market_prefect_pipeline
    command: python orchestration/deployments/register_deployment.py
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - db
      - prefect-server
    environment:
      - DATABASE_URL=mysql+pymysql://appuser:apppassword@db:3306/job_market_db
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_DEPLOYMENT_CRON=0 2 * * *
      - PREFECT_PAUSE_ON_SHUTDOWN=false
    restart: unless-stopped

volumes:
  mysql_data:
  prefect_data:
