version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: job_market_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_market_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  dashboard:
    build: .
    container_name: job_market_dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://appuser:apppassword@db:3306/job_market_db

  prefect-server:
    image: prefecthq/prefect:3-python3.10
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

volumes:
  mysql_data:
  prefect_data:
